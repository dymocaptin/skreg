name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust — test, lint, format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --workspace

  python-infra:
    name: Python infra — lint, type-check, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: ruff check
        run: uv run ruff check src/

      - name: black check
        run: uv run black --check src/

      - name: mypy
        run: uv run mypy src/

      - name: pytest
        run: uv run pytest --cov-fail-under=90

  web:
    name: Web — test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: web
      - name: Run tests
        run: npm test
        working-directory: web
      - name: Build
        run: npm run build
        working-directory: web
      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/
          retention-days: 1

  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  build-push:
    name: Build and push Docker images to ECR
    needs: [rust, python-infra, web, changes]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.changes.outputs.rust == 'true'
    permissions:
      id-token: write
      contents: read
    outputs:
      registry: ${{ steps.ecr-login.outputs.registry }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-west-2

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        run: |
          aws ecr create-repository --repository-name skreg-api --image-tag-mutability MUTABLE 2>/dev/null || true
          aws ecr create-repository --repository-name skreg-worker --image-tag-mutability MUTABLE 2>/dev/null || true

      - name: Build and push skreg-api
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          SHA: ${{ github.sha }}
        run: |
          docker build \
            -f crates/skreg-api/Dockerfile \
            -t "$REGISTRY/skreg-api:$SHA" \
            -t "$REGISTRY/skreg-api:latest" \
            .
          docker push "$REGISTRY/skreg-api:$SHA"
          docker push "$REGISTRY/skreg-api:latest"

      - name: Build and push skreg-worker
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          SHA: ${{ github.sha }}
        run: |
          docker build \
            -f crates/skreg-worker/Dockerfile \
            -t "$REGISTRY/skreg-worker:$SHA" \
            -t "$REGISTRY/skreg-worker:latest" \
            .
          docker push "$REGISTRY/skreg-worker:$SHA"
          docker push "$REGISTRY/skreg-worker:latest"

  deploy:
    name: Deploy infrastructure with Pulumi
    needs: [rust, python-infra, web, changes, build-push]
    runs-on: ubuntu-latest
    if: >
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.rust.result == 'success' &&
      needs.python-infra.result == 'success' &&
      needs.web.result == 'success' &&
      (needs.build-push.result == 'success' || needs.build-push.result == 'skipped')
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-west-2

      - name: Resolve image URIs
        working-directory: .
        run: |
          if [ "${{ needs.build-push.result }}" = "success" ]; then
            echo "SKREG_API_IMAGE_URI=${{ needs.build-push.outputs.registry }}/skreg-api:${{ github.sha }}" >> "$GITHUB_ENV"
            echo "SKREG_WORKER_IMAGE_URI=${{ needs.build-push.outputs.registry }}/skreg-worker:${{ github.sha }}" >> "$GITHUB_ENV"
          else
            ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
            REGISTRY="${ACCOUNT}.dkr.ecr.us-west-2.amazonaws.com"
            echo "SKREG_API_IMAGE_URI=${REGISTRY}/skreg-api:latest" >> "$GITHUB_ENV"
            echo "SKREG_WORKER_IMAGE_URI=${REGISTRY}/skreg-worker:latest" >> "$GITHUB_ENV"
          fi

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist/

      - name: Install Pulumi CLI
        uses: pulumi/actions@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Pulumi up
        env:
          PULUMI_BACKEND_URL: ${{ secrets.PULUMI_BACKEND_URL }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          SKREG_CLOUD_PROVIDER: aws
          SKREG_DOMAIN_NAME: ${{ vars.SKREG_DOMAIN_NAME }}
          SKREG_EXISTING_CERT_ARN: ${{ secrets.SKREG_EXISTING_CERT_ARN }}
          SKREG_FROM_EMAIL: ${{ vars.SKREG_FROM_EMAIL }}
          SKREG_SES_REGION: ${{ vars.SKREG_SES_REGION }}
          SKREG_WEB_DOMAIN_NAME: ${{ vars.SKREG_WEB_DOMAIN_NAME }}
          SKREG_WEB_CERT_ARN: ${{ secrets.SKREG_WEB_CERT_ARN }}
        run: |
          pulumi stack select main
          pulumi up --yes
