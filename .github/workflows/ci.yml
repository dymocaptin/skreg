name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust — test, lint, format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --workspace

  python-infra:
    name: Python infra — lint, type-check, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: ruff check
        run: uv run ruff check src/

      - name: black check
        run: uv run black --check src/

      - name: mypy
        run: uv run mypy src/

      - name: pytest
        run: uv run pytest --cov-fail-under=90

  web:
    name: Web — test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: web
      - name: Run tests
        run: npm test
        working-directory: web
      - name: Build
        run: npm run build
        working-directory: web
      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/
          retention-days: 1

  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  build-push:
    name: Build and push Docker images to local registry
    needs: [rust, python-infra, web, changes]
    runs-on: skreg-runner
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist/

      - name: Build and push skreg-api
        run: |
          docker build \
            -f crates/skreg-api/Dockerfile \
            -t localhost:30500/skreg-api:${{ github.sha }} \
            -t localhost:30500/skreg-api:latest \
            .
          docker push localhost:30500/skreg-api:${{ github.sha }}
          docker push localhost:30500/skreg-api:latest

      - name: Build and push skreg-worker
        run: |
          docker build \
            -f crates/skreg-worker/Dockerfile \
            -t localhost:30500/skreg-worker:${{ github.sha }} \
            -t localhost:30500/skreg-worker:latest \
            .
          docker push localhost:30500/skreg-worker:${{ github.sha }}
          docker push localhost:30500/skreg-worker:latest

      - name: Build and push skreg-dispatcher
        run: |
          docker build \
            -f crates/skreg-dispatcher/Dockerfile \
            -t localhost:30500/skreg-dispatcher:${{ github.sha }} \
            -t localhost:30500/skreg-dispatcher:latest \
            .
          docker push localhost:30500/skreg-dispatcher:${{ github.sha }}
          docker push localhost:30500/skreg-dispatcher:latest

  deploy:
    name: Deploy with Pulumi
    needs: [rust, python-infra, web, changes, build-push]
    runs-on: skreg-runner
    if: >
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.rust.result == 'success' &&
      needs.python-infra.result == 'success' &&
      needs.web.result == 'success' &&
      (needs.build-push.result == 'success' || needs.build-push.result == 'skipped')
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist/

      - name: Install Pulumi CLI
        uses: pulumi/actions@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Pulumi up
        env:
          PULUMI_BACKEND_URL: ${{ secrets.PULUMI_BACKEND_URL }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          SKREG_CLOUD_PROVIDER: k8s
          SKREG_DOMAIN_NAME: ${{ vars.SKREG_DOMAIN_NAME }}
          SKREG_FROM_EMAIL: ${{ vars.SKREG_FROM_EMAIL }}
          SKREG_GITHUB_REPO: dymocaptin/skreg
          SKREG_HOSTED_ZONE_ID: ${{ secrets.SKREG_HOSTED_ZONE_ID }}
          SKREG_API_IMAGE_URI: >-
            ${{ needs.build-push.result == 'success' &&
                format('localhost:30500/skreg-api:{0}', github.sha) ||
                'localhost:30500/skreg-api:latest' }}
          SKREG_WORKER_IMAGE_URI: >-
            ${{ needs.build-push.result == 'success' &&
                format('localhost:30500/skreg-worker:{0}', github.sha) ||
                'localhost:30500/skreg-worker:latest' }}
        run: |
          pulumi stack select k8s
          pulumi up --yes
